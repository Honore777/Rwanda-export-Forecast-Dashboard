name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-

    - name: Install core requirements
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt

    - name: Syntax check
      run: python -m py_compile app.py

    - name: Smoke import tests
      run: |
        python - <<'PY'
        import sys
        modules = ["numpy","pandas","plotly","altair","pycountry","streamlit"]
        failed = False
        for m in modules:
            try:
                __import__(m)
                print(m + ' OK')
            except Exception as e:
                print(m + ' IMPORT FAILED:', e)
                failed = True
        if failed:
            sys.exit(1)
        print('All smoke imports OK')
        PY
